function addMonths(dateStr,n){
  const [y,m,d]=dateStr.split("-").map(Number);
  const dt=new Date(y,m-1+n,d);
  return{y:dt.getFullYear(),m:dt.getMonth()+1};
}
function fmtARS(n){return "$"+Math.round(n).toLocaleString("es-AR");}
function fmtUSD(n){return "U$S "+n.toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function pct(a,b){return b===0?0:Math.round(a/b*100);}

function TarjetaView({totalUSD,saldo}){
  const [dolar,setDolar]=useState(1395);
  const cuotasPorMes=useMemo(()=>{
    const map={};
    CUOTAS_RAW.forEach(item=>{
      for(let i=0;i<item.cuotas;i++){
        const {y,m}=addMonths(item.fecha,i);
        const key=`${y}-${String(m).padStart(2,"0")}`;
        if(!map[key])map[key]={ars:0,items:[]};
        map[key].ars+=item.xCuota;
        map[key].items.push({detalle:item.detalle,resp:item.resp,cuota:i+1,total:item.cuotas,monto:item.xCuota});
      }
    });
    return map;
  },[]);
  const meses=useMemo(()=>Object.keys(cuotasPorMes).sort(),[cuotasPorMes]);
  const [expandido,setExpandido]=useState(null);
  const maxARS=Math.max(...Object.values(cuotasPorMes).map(v=>v.ars),1);
  const totalGeneral=CUOTAS_RAW.reduce((s,i)=>s+i.total,0);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"12px",marginBottom:"1.5rem"}}>
        {[
          {l:"Total en cuotas ARS",v:fmtARS(totalGeneral)},
          {l:"Total en cuotas USD",v:fmtUSD(totalGeneral/dolar)},
          {l:"Cuota mensual total",v:fmtARS(602595.17)},
          {l:"Meses con vencimientos",v:meses.length},
        ].map(m=>(
          <div key={m.l} className="metric">
            <div style={{fontSize:"13px",color:"#666",marginBottom:"4px"}}>{m.l}</div>
            <div style={{fontSize:"18px",fontWeight:500}}>{m.v}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{marginBottom:"1.5rem",display:"flex",alignItems:"center",gap:"16px",flexWrap:"wrap"}}>
        <span style={{fontSize:"13px",color:"#666"}}>Cotización USD:</span>
        <input type="number" value={dolar} onChange={e=>setDolar(Number(e.target.value))} style={{width:"110px"}}/>
        <span style={{fontSize:"13px",color:"#666"}}>· Cuota mensual: <strong>{fmtUSD(602595.17/dolar)}</strong></span>
      </div>
      <div className="card" style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"14px",fontWeight:500,marginBottom:"1rem"}}>Vencimientos mensuales</div>
        {meses.map(key=>{
          const {ars,items}=cuotasPorMes[key];
          const [y,m]=key.split("-");
          const label=`${MONTHS[parseInt(m)-1]} ${y}`;
          const w=Math.round(ars/maxARS*100);
          const isOpen=expandido===key;
          return(
            <div key={key}>
              <div onClick={()=>setExpandido(isOpen?null:key)} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:"10px",padding:"4px 0"}}>
                <span style={{fontSize:"12px",color:"#666",width:"60px",flexShrink:0}}>{label}</span>
                <div style={{flex:1,height:"20px",background:"#f0f0ee",borderRadius:"4px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:w+"%",background:"#7F77DD",borderRadius:"4px"}}/>
                </div>
                <span style={{fontSize:"12px",color:"#666",width:"110px",textAlign:"right",flexShrink:0}}>{fmtARS(Math.round(ars))}</span>
                <span style={{fontSize:"12px",color:"#999",width:"14px",textAlign:"center"}}>{isOpen?"▲":"▼"}</span>
              </div>
              {isOpen&&(
                <div style={{marginLeft:"70px",marginBottom:"6px",display:"flex",flexDirection:"column",gap:"4px"}}>
                  {items.map((it,i)=>(
                    <div key={i} style={{background:"#f5f5f3",borderRadius:"8px",padding:"6px 10px",fontSize:"12px",display:"flex",justifyContent:"space-between"}}>
                      <span style={{color:"#666"}}>{it.detalle} <span style={{color:"#999"}}>({it.cuota}/{it.total})</span></span>
                      <span style={{fontWeight:500}}>{fmtARS(Math.round(it.monto))}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div className="card">
        <div style={{fontSize:"14px",fontWeight:500,marginBottom:"1rem"}}>Compras en cuotas</div>
        {CUOTAS_RAW.map((item,i)=>{
          const fin=addMonths(item.fecha,item.cuotas-1);
          return(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<CUOTAS_RAW.length-1?"0.5px solid #e0e0dc":"none",gap:"12px"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:"13px",fontWeight:500}}>{item.detalle}</div>
                <div style={{fontSize:"12px",color:"#666"}}>{item.resp} · {item.cuotas} cuotas · vence {MONTHS[fin.m-1]} {fin.y}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:"13px",fontWeight:500}}>{fmtARS(item.total)}</div>
                <div style={{fontSize:"12px",color:"#666"}}>{fmtARS(Math.round(item.xCuota))}/mes</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App(){
  const [gastos,setGastos]=useState(GASTOS_INIT);
  const [tab,setTab]=useState("dashboard");
  const [form,setForm]=useState({fecha:"",cat:"Mano de Obra",detalle:"",resp:"",ars:"",usd:""});
  const [filterCat,setFilterCat]=useState("todas");

  const totalUSD=useMemo(()=>gastos.reduce((s,g)=>s+g.usd,0),[gastos]);
  const totalARS=useMemo(()=>gastos.reduce((s,g)=>s+g.ars,0),[gastos]);
  const saldo=PRESUPUESTO_USD-totalUSD;
  const pctGastado=pct(totalUSD,PRESUPUESTO_USD);
  const moUSD=gastos.filter(g=>g.cat==="Mano de Obra").reduce((s,g)=>s+g.usd,0);
  const matUSD=gastos.filter(g=>g.cat==="Materiales").reduce((s,g)=>s+g.usd,0);
  const otUSD=gastos.filter(g=>g.cat==="Otros").reduce((s,g)=>s+g.usd,0);

  const porResp=useMemo(()=>{
    const m={};
    gastos.forEach(g=>{m[g.resp]=(m[g.resp]||0)+g.usd;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,8);
  },[gastos]);

  const gastosFiltrados=useMemo(()=>{
    let arr=filterCat==="todas"?[...gastos]:[...gastos].filter(g=>g.cat===filterCat);
    return arr.sort((a,b)=>a.fecha.localeCompare(b.fecha));
  },[gastos,filterCat]);

  function agregarGasto(){
    if(!form.fecha||!form.detalle||!form.usd)return;
    setGastos(p=>[...p,{id:Date.now(),fecha:form.fecha,cat:form.cat,detalle:form.detalle,resp:form.resp,ars:parseFloat(form.ars)||0,usd:parseFloat(form.usd)||0}]);
    setForm({fecha:"",cat:"Mano de Obra",detalle:"",resp:"",ars:"",usd:""});
  }

  const tabs=[{k:"dashboard",l:"Dashboard"},{k:"cargar",l:"Cargar pago"},{k:"gastos",l:"Pagos"},{k:"presupuesto",l:"Presupuesto"},{k:"tarjeta",l:"Tarjeta"},{k:"proveedores",l:"Proveedores"}];

  const navBtn=(t)=>({
    padding:"6px 16px",borderRadius:"8px",fontSize:"14px",
    border:tab===t.k?"1.5px solid #333":"1px solid #d0d0cc",
    background:tab===t.k?"#f0f0ee":"#fff",
    color:"#1a1a1a",cursor:"pointer"
  });

  return(
    <div style={{maxWidth:"700px",margin:"0 auto",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"#1a1a1a"}}>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"20px",fontWeight:500}}>Control de Obras</div>
        <div style={{fontSize:"13px",color:"#666"}}>Dólar: $1.395 · Marzo 2026</div>
      </div>
      <div style={{display:"flex",gap:"8px",marginBottom:"1.5rem",flexWrap:"wrap"}}>
        {tabs.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={navBtn(t)}>{t.l}</button>)}
      </div>

      {tab==="dashboard"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"12px",marginBottom:"1.5rem"}}>
            {[
              {l:"Presupuesto",v:fmtUSD(PRESUPUESTO_USD)},
              {l:"Pagado",v:fmtUSD(totalUSD)},
              {l:"Saldo disponible",v:fmtUSD(saldo),warn:saldo<1000},
              {l:"Pagos registrados",v:gastos.length},
            ].map(m=>(
              <div key={m.l} className="metric">
                <div style={{fontSize:"13px",color:"#666",marginBottom:"4px"}}>{m.l}</div>
                <div style={{fontSize:"20px",fontWeight:500,color:m.warn?"#c0392b":"#1a1a1a"}}>{m.v}</div>
              </div>
            ))}
          </div>
          <div className="card" style={{marginBottom:"1.5rem"}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"13px",color:"#666",marginBottom:"8px"}}>
              <span>Avance del presupuesto</span>
              <span style={{fontWeight:500,color:"#1a1a1a"}}>{pctGastado}%</span>
            </div>
            <div style={{height:"12px",background:"#f0f0ee",borderRadius:"6px",overflow:"hidden"}}>
              <div style={{height:"100%",width:pctGastado+"%",background:pctGastado>90?"#c0392b":pctGastado>75?"#EF9F27":"#1D9E75",borderRadius:"6px"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",color:"#666",marginTop:"6px"}}>
              <span>{fmtUSD(totalUSD)} pagado</span><span>{fmtUSD(saldo)} disponible</span>
            </div>
          </div>
          <div className="card" style={{marginBottom:"1.5rem"}}>
            <div style={{fontSize:"14px",fontWeight:500,marginBottom:"1rem"}}>Desglose por categoría</div>
            {[["Mano de Obra",moUSD],["Materiales",matUSD],["Otros",otUSD]].map(([cat,val])=>(
              <div key={cat} style={{marginBottom:"12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"4px"}}>
                  <span style={{display:"flex",alignItems:"center",gap:"6px"}}>
                    <span style={{width:"8px",height:"8px",borderRadius:"50%",background:CAT_COLORS[cat],display:"inline-block"}}/>
                    {cat}
                  </span>
                  <span style={{color:"#666"}}>{fmtUSD(val)} · {pct(val,totalUSD)}%</span>
                </div>
                <div style={{height:"8px",background:"#f0f0ee",borderRadius:"4px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:pct(val,totalUSD)+"%",background:CAT_COLORS[cat],borderRadius:"4px"}}/>
                </div>
              </div>
            ))}
            <div style={{borderTop:"0.5px solid #e0e0dc",marginTop:"12px",paddingTop:"10px",display:"flex",justifyContent:"space-between",fontSize:"13px"}}>
              <span style={{color:"#666"}}>Total pagado en ARS</span>
              <span style={{fontWeight:500}}>{fmtARS(totalARS)}</span>
            </div>
          </div>
          <div className="card">
            <div style={{fontSize:"14px",fontWeight:500,marginBottom:"1rem"}}>Top proveedores</div>
            {porResp.map(([resp,val],i)=>(
              <div key={resp} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<porResp.length-1?"0.5px solid #e0e0dc":"none",fontSize:"13px"}}>
                <span>{resp}</span><span style={{fontWeight:500,color:"#666"}}>{fmtUSD(val)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="cargar"&&(
        <div className="card">
          <div style={{fontSize:"15px",fontWeight:500,marginBottom:"1.25rem"}}>Nuevo pago</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
            <div>
              <div style={{fontSize:"13px",color:"#666",marginBottom:"4px"}}>Fecha</div>
              <input type="date" value={form.fecha} onChange={e=>setForm(p=>({...p,fecha:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:"13px",color:"#666",marginBottom:"4px"}}>Categoría</div>
              <select value={form.cat} onChange={e=>setForm(p=>({...p,cat:e.target.value}))}>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <div style={{fontSize:"13px",color:"#666",marginBottom:"4px"}}>Detalle</div>
              <input type="text" value={form.detalle} placeholder="Ej: Pago4 Eric" onChange={e=>setForm(p=>({...p,detalle:e.target.value}))}/>
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <div style={{fontSize:"13px",color:"#666",marginBottom:"4px"}}>Responsable / Proveedor</div>
              <input type="text" value={form.resp} placeholder="Ej: Eric" onChange={e=>setForm(p=>({...p,resp:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:"13px",color:"#666",marginBottom:"4px"}}>Monto ARS</div>
              <input type="number" value={form.ars} placeholder="0" onChange={e=>setForm(p=>({...p,ars:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:"13px",color:"#666",marginBottom:"4px"}}>Equivalente USD</div>
              <input type="number" value={form.usd} placeholder="0" onChange={e=>setForm(p=>({...p,usd:e.target.value}))}/>
            </div>
          </div>
          <button onClick={agregarGasto} style={{marginTop:"1.25rem",padding:"8px 24px",borderRadius:"8px",border:"1px solid #d0d0cc",background:"#f5f5f3",color:"#1a1a1a",fontSize:"14px"}}>
            Agregar pago
          </button>
        </div>
      )}

      {tab==="gastos"&&(
        <div>
          <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap"}}>
            <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:"auto"}}>
              <option value="todas">Todas las categorías</option>
              {CATS.map(c=><option key={c}>{c}</option>)}
            </select>
            <span style={{fontSize:"13px",color:"#666"}}>{gastosFiltrados.length} registros · {fmtUSD(gastosFiltrados.reduce((s,g)=>s+g.usd,0))}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {gastosFiltrados.map(g=>(
              <div key={g.id} className="card" style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:"12px",padding:"0.75rem 1rem"}}>
                <div style={{display:"flex",alignItems:"center",gap:"10px",flex:1,minWidth:0}}>
                  <div style={{width:"8px",height:"8px",borderRadius:"50%",background:CAT_COLORS[g.cat]||"#888",flexShrink:0}}/>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:"14px",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.detalle}</div>
                    <div style={{fontSize:"12px",color:"#666"}}>{g.cat} · {g.resp} · {g.fecha}</div>
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:"14px",fontWeight:500}}>{fmtUSD(g.usd)}</div>
                  <div style={{fontSize:"12px",color:"#666"}}>{fmtARS(g.ars)}</div>
                </div>
                <button onClick={()=>setGastos(p=>p.filter(x=>x.id!==g.id))} style={{background:"none",border:"none",color:"#999",fontSize:"18px",padding:"0 4px",lineHeight:1}}>×</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="presupuesto"&&(
        <div>
          {["Trabajo Casa","Material Estimado","Falta Cotizar"].map(tipo=>{
            const items=PRESUPUESTO_ITEMS.filter(i=>i.tipo===tipo);
            const totalTipo=items.reduce((s,i)=>s+i.usd,0);
            return(
              <div key={tipo} className="card" style={{marginBottom:"1rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                    <span style={{width:"8px",height:"8px",borderRadius:"50%",background:TIPO_COLORS[tipo],display:"inline-block"}}/>
                    <span style={{fontSize:"14px",fontWeight:500}}>{tipo}</span>
                  </div>
                  <span style={{fontSize:"13px",fontWeight:500,color:"#666"}}>{fmtUSD(totalTipo)}</span>
                </div>
                {items.map((item,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:"13px",padding:"5px 0",borderTop:"0.5px solid #e0e0dc"}}>
                    <span style={{color:"#666",flex:1,paddingRight:"12px"}}>{item.detalle}</span>
                    <span style={{fontWeight:500}}>{fmtUSD(item.usd)}</span>
                  </div>
                ))}
              </div>
            );
          })}
          <div style={{background:"#f5f5f3",borderRadius:"12px",padding:"1rem 1.25rem"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",textAlign:"center"}}>
              {[
                {l:"Presupuestado",v:fmtUSD(PRESUPUESTO_USD)},
                {l:"Pagado",v:fmtUSD(totalUSD)},
                {l:"Saldo",v:fmtUSD(saldo),warn:saldo<1000},
              ].map(m=>(
                <div key={m.l}>
                  <div style={{fontSize:"12px",color:"#666",marginBottom:"4px"}}>{m.l}</div>
                  <div style={{fontSize:"16px",fontWeight:500,color:m.warn?"#c0392b":"#1a1a1a"}}>{m.v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {tab==="tarjeta"&&<TarjetaView totalUSD={totalUSD} saldo={saldo}/>}

      {tab==="proveedores"&&(
        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
          {porResp.map(([resp,val])=>{
            const regs=gastos.filter(g=>g.resp===resp);
            const cats=[...new Set(regs.map(g=>g.cat))];
            return(
              <div key={resp} className="card" style={{padding:"0.75rem 1rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
                  <div style={{fontSize:"14px",fontWeight:500}}>{resp}</div>
                  <div style={{fontSize:"14px",fontWeight:500}}>{fmtUSD(val)}</div>
                </div>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:"12px",color:"#666"}}>{regs.length} pago{regs.length!==1?"s":""}</span>
                  {cats.map(c=>(
                    <span key={c} style={{fontSize:"11px",padding:"2px 8px",borderRadius:"8px",background:"#f0f0ee",color:"#666"}}>{c}</span>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
